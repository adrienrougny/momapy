[tox]
envlist = py{310,311,312,313}-{min,all}, py314-min

[testenv]
description = Run tests with pytest
dependency_groups = test
extras =
  all: all
commands =
    pytest {posargs:tests/}

[testenv:lint]
description = Check docstrings (ruff D) and type annotations (ruff ANN) plus formatting
skip_install = true
deps = ruff>=0.12.8
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:coverage]
description = Run tests with coverage report
dependency_groups = test
extras = all
commands =
    pytest --cov=momapy --cov-report=term --cov-report=html {posargs:tests/}
